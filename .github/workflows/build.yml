name: Build vip_bf

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HL2SDK_ROOT: ${{ github.workspace }}/external
      MMS_PATH: ${{ github.workspace }}/external/metamod-source
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git g++ binutils python3 python3-pip
          git clone https://github.com/alliedmodders/ambuild.git
          cd ambuild
          pip3 install .
          cd ..
          mkdir -p external
          cd external
          git clone --recursive --branch master --single-branch https://github.com/alliedmodders/metamod-source.git
          git clone --recursive --branch cs2 --single-branch https://github.com/alliedmodders/hl2sdk.git hl2sdk-cs2
          git clone https://github.com/pisex/SchemaEntity.git

      - name: Patch SchemaEntity for newer HL2SDK
        run: |
          cp -r external/SchemaEntity VIP_BaseFunctions/SchemaEntity
          sed -i 's/NetworkStateChanged_t/NetworkStateChangedData/g' VIP_BaseFunctions/SchemaEntity/schemasystem.cpp
          sed -i 's/FL_PAWN_FAKECLIENT/FL_FAKECLIENT/g' VIP_BaseFunctions/SchemaEntity/CCSPlayerPawn.h
          sed -i 's/FL_CONTROLLER_FAKECLIENT/FL_FAKECLIENT/g' VIP_BaseFunctions/SchemaEntity/CCSPlayerController.h

      - name: Build VIP_BaseFunctions
        run: |
          cd VIP_BaseFunctions/source
          mkdir build
          cd build
          python3 ../configure.py -s cs2 --targets x86_64 --enable-optimize --symbol-files --hl2sdk-manifests=${{ github.workspace }}/VIP_BaseFunctions/source/hl2sdk-manifests --mms_path=$MMS_PATH --hl2sdk-root=$HL2SDK_ROOT
          ambuild

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vip_bf
          path: VIP_BaseFunctions/source/build/package/addons/vip_modules/vip_bf.so